<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>割合と比率 - STREET BATTLE</title>
    <!-- SF6風フォントをインポート -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Teko:wght@500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sf6_battle.css?v=1.0.6">
</head>
<body>

    <div id="app" class="sf6-app-container">
        <!-- Start Screen (VS Battle Screen) -->
        <div id="screen-start" class="screen active">
            <div class="logo-area">
                <h1 class="logo-sf6">WARIAI<br><span>BATTLE</span></h1>
                <p class="subtitle-sf6">STREET FIGHTING MATH</p>
            </div>
            
            <div class="vs-container">
                <!-- 1P Player -->
                <div class="vs-card player-card">
                    <div class="card-side-label p1-color">1P</div>
                    <div class="player-input-wrap">
                        <input type="text" id="player-name" placeholder="CHALLENGER NAME" autocomplete="off" maxlength="10" />
                    </div>
                </div>
                
                <!-- VS Logo -->
                <div class="vs-logo-wrapper">
                    <span class="vs-logo-text">VS</span>
                </div>
                
                <!-- CPU Rival (Zangief) -->
                <div class="vs-card rival-card">
                    <div class="card-side-label cpu-color">2P</div>
                    <div class="rival-name-wrap">
                        <div class="rival-name">ZANGIEF</div>
                        <div class="rival-title">THE RED CYCLONE</div>
                    </div>
                    <div class="zangief-vs-avatar-wrapper">
                        <img src="css/zangief_portrait.png" class="zangief-vs-img" />
                    </div>
                </div>
            </div>
            
            <div class="menu-buttons-sf6">
                <button id="btn-start" class="primary-btn-sf6">BATTLE START</button>
                <button id="btn-resume" class="resume-btn-sf6" style="display: none;">RESUME BATTLE</button>
                <button id="btn-show-ranking" class="secondary-btn-sf6">LEADERBOARD</button>
            </div>
        </div>

        <!-- Game Screen (Battle Stage) -->
        <div id="screen-game" class="screen">
            <div class="game-header">
                <!-- 1P Player Life Bar -->
                <div class="hud-item-sf6 player-hud">
                    <div class="hud-meta">
                        <span class="p1-label">1P</span>
                        <span id="player-name-display" class="hud-player-name">CHALLENGER</span>
                    </div>
                    <div class="life-bar-wrapper">
                        <div id="player-life-bar" class="life-bar-fill" style="width: 100%;"></div>
                        <div class="life-bar-bg"></div>
                    </div>
                </div>
                
                <!-- VS Center HUD (Round / STAGE / Score) -->
                <div class="hud-center-sf6">
                    <div class="stage-label">STAGE <span id="game-stage">1</span></div>
                    <div class="score-display-mini">🪙<span id="current-score">0</span></div>
                </div>
                
                <!-- 2P Zangief Life Bar -->
                <div class="hud-item-sf6 rival-hud">
                    <div class="hud-meta rival-meta">
                        <div class="rival-avatar-mini-wrapper">
                            <img src="css/zangief_portrait.png" class="rival-avatar-mini" />
                        </div>
                        <span id="rival-name-display" class="hud-player-name">ZANGIEF</span>
                        <span class="p2-label">2P</span>
                    </div>
                    <div class="life-bar-wrapper rival-bar-wrapper">
                        <div id="rival-life-bar" class="life-bar-fill rival-bar-fill" style="width: 100%;"></div>
                        <div class="life-bar-bg"></div>
                    </div>
                </div>
            </div>
            
            <!-- Combo Counter Overlay -->
            <div id="combo-container" class="combo-counter" style="display: none;">
                <span id="combo-count">0</span>
                <span class="combo-label">COMBOS!</span>
            </div>
            
            <div class="problem-board">
                <!-- Question and Answer Box -->
                <div class="question-container">
                    <div id="question-text" class="question">□に入る数を答えてザンギエフをKOしろ！</div>
                    
                    <div class="answer-box-sf6" id="answer-box-normal">
                        <span id="user-input" class="user-input-text"></span>
                        <span class="cursor"></span>
                    </div>
                </div>
                
                <!-- Canvas & Diagram Area (Spray Wall) -->
                <div id="calc-area">
                    <div id="diagram-container"></div>
                    <canvas id="calc-canvas"></canvas>
                    <button id="btn-clear-canvas" class="btn-clear-canvas">RESET</button>
                </div>
            </div>

            <!-- Arcade Button Numpad -->
            <div class="numpad-sf6">
                <button class="num-key btn-arcade color-yellow">7</button>
                <button class="num-key btn-arcade color-yellow">8</button>
                <button class="num-key btn-arcade color-yellow">9</button>
                
                <button class="num-key btn-arcade color-cyan">4</button>
                <button class="num-key btn-arcade color-cyan">5</button>
                <button class="num-key btn-arcade color-cyan">6</button>
                
                <button class="num-key btn-arcade color-pink">1</button>
                <button class="num-key btn-arcade color-pink">2</button>
                <button class="num-key btn-arcade color-pink">3</button>
                
                <button class="num-key btn-arcade color-white">0</button>
                <button class="num-key btn-arcade color-white">.</button>
                <button class="cmd-key btn-arcade btn-focus-toggle color-dark">ー</button>
                
                <button class="cmd-key btn-arcade btn-delete color-dark" style="grid-column: span 1;">DEL</button>
                <button class="cmd-key btn-arcade btn-enter color-gold" style="grid-column: span 2;">ENTER</button>
            </div>
        </div>

        <!-- Result Screen (K.O. / Victory Screen) -->
        <div id="screen-result" class="screen">
            <div class="ko-banner">K.O.</div>
            <h2 id="result-status" class="result-title">VICTORY</h2>
            <div class="final-score-sf6">
                <span class="score-label">FINAL SCORE</span>
                <span id="final-score-value" class="score-value">0</span>
            </div>
            <p id="saving-status" class="status-msg">UPLOADING DATA...</p>
            <div class="menu-buttons-sf6">
                <button id="btn-retry" class="primary-btn-sf6">PLAY AGAIN</button>
                <button id="btn-result-ranking" class="secondary-btn-sf6">LEADERBOARD</button>
            </div>
        </div>

        <!-- Ranking Screen (Leaderboard) -->
        <div id="screen-ranking" class="screen">
            <h2 class="leaderboard-title">LEADERBOARD</h2>
            <div id="ranking-list" class="ranking-board-sf6">
                <div class="loading-spinner-sf6"></div>
            </div>
            <button id="btn-back-home" class="primary-btn-sf6">BACK TO MENU</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="problem-generator.js?v=1.0.6"></script>
    <script src="sf6_battle.js?v=1.0.6"></script>
</body>
</html>
