<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>郡中っ子 計算グランプリ</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=M+PLUS+Rounded+1c:wght@700&family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app" class="glass-container">
        <!-- Start Screen -->
        <div id="screen-start" class="screen active">
            <h1 class="logo">郡中っ子<br><span>計算グランプリ</span></h1>
            <p class="description">今日のお題: <span id="topic-name">割合と比率</span></p>
            <input type="text" id="player-name" placeholder="なまえをいれてね" autocomplete="off" />
            <button id="btn-start" class="primary-btn">スタート！</button>
            <button id="btn-resume" class="primary-btn" style="display: none; background: #187a3a; border-color: #3cd47a #083b18 #083b18 #3cd47a; text-shadow: 2px 2px 0px #082b12; margin-bottom: 15px;">つづきからあそぶ</button>
            <button id="btn-show-ranking" class="secondary-btn">ランキングをみる</button>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="screen">
            <div class="game-header">
                <div class="hud-group">
                    <div class="hud-item lives-hud">
                        <span class="hud-icon">❤️</span>
                        <span class="hud-text">LIVES:</span>
                        <span id="lives-left" class="hud-value">3</span>
                    </div>
                    <div class="hud-item score-hud">
                        <span class="hud-icon">🪙</span>
                        <span class="hud-text">SCORE:</span>
                        <span id="current-score" class="hud-value">0</span>
                    </div>
                </div>
            </div>
            
            <div class="problem-board">
                <div class="question-container">
                    <div id="question-text" class="question">計算しましょう。</div>
                    <div class="equals-sign">＝</div>
                    <div class="answer-box" id="answer-box-normal">
                        <span id="user-input" class="user-input-text"></span>
                        <span class="cursor"></span>
                    </div>
                    <div class="answer-box remain-box" id="answer-box-remain" style="display: none;">
                        <div class="input-slot active" id="slot-q">
                            <span id="user-input-q" class="user-input-text"></span>
                            <span class="cursor q-cursor"></span>
                        </div>
                        <span class="remain-label">あまり</span>
                        <div class="input-slot" id="slot-r">
                            <span id="user-input-r" class="user-input-text"></span>
                            <span class="cursor r-cursor" style="display: none;"></span>
                        </div>
                    </div>
                </div>
                <div id="calc-area">
                    <div id="diagram-container"></div>
                    <canvas id="calc-canvas"></canvas>
                    <button id="btn-clear-canvas" class="btn-clear-canvas">消す</button>
                </div>
            </div>

            <!-- Numpad for touch/mouse -->
            <div class="numpad">
                <button class="num-key">7</button><button class="num-key">8</button><button class="num-key">9</button>
                <button class="num-key">4</button><button class="num-key">5</button><button class="num-key">6</button>
                <button class="num-key">1</button><button class="num-key">2</button><button class="num-key">3</button>
                <button class="num-key">0</button><button class="num-key dot-key">.</button><button class="cmd-key btn-focus-toggle">あまり</button>
                <button class="cmd-key btn-delete" style="grid-column: span 1;">消す</button>
                <button class="cmd-key btn-enter" style="grid-column: span 2;">こたえる！</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="screen">
            <h2>タイムアップ！</h2>
            <div class="final-score">
                <span class="score-label">あなたのスコア</span>
                <span id="final-score-value" class="score-value">150</span>
            </div>
            <p id="saving-status" class="status-msg">ランキングに送信中...</p>
            <button id="btn-retry" class="primary-btn">もういちど</button>
            <button id="btn-result-ranking" class="secondary-btn">ランキングへ</button>
        </div>

        <!-- Ranking Screen -->
        <div id="screen-ranking" class="screen">
            <h2>🏆 T O P 1 0 0 🏆</h2>
            <div id="ranking-list" class="ranking-board">
                <div class="loading-spinner"></div>
            </div>
            <button id="btn-back-home" class="primary-btn">もどる</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="problem-generator.js"></script>
    <script src="app.js"></script>
</body>
</html>
